message: >-
  I don't have any plans to port Ultima V in the the Threat of the Trinity
  engine. However, there are a few projects/efforts ongoing to decompile Ultima
  V. I'd be very interested if any of those every comes to fruition. Ultima V is
  my favorite 'engines' for Ultima, or as an RPG. I'd love to expand on it, add
  modules, new towns etc. Just like I did for Ultima IV. Though I have to agree,
  the aiming in Ultima V was torture. I like the simple diagonal enhancements of
  ToTT better.
