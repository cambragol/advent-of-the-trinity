message: "Good to hear you figured out the balloon. You have the mechanics correct. It should make your adventures a little more rapid.\r\n\r\nAs for the Apple II graphics, I agree they have more 'style' - the way they actually worked on the Apple II was much more of a function before form situation. The restrictions on what could be done determined the form of many things. The graphics that come after the Apple II were a splurge of color when the previous restrictions were lifted. The same pattern has flowed through the industry for years. More is not always better."
